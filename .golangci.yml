version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - revive
    - gosec
    - misspell

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: unexported-return
        severity: warning
  gosec:
    excludes:
      # G204: subprocess launched with variable — expected for SSH exec wrappers
      - G204
  misspell:
    locale: US

issues:
  max-same-issues: 0
  exclude-rules:
    # Test files get a lighter touch on security checks
    - path: _test\.go
      linters:
        - gosec
        - errcheck
