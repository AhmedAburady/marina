name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

  build:
    needs: vet
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: linux
          - os: macos-latest
            targets: darwin
          - os: windows-latest
            targets: windows

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build binaries (Linux)
        if: matrix.targets == 'linux'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=$VERSION"
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o marina-linux-amd64 ./cmd/marina
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o marina-linux-arm64 ./cmd/marina

      - name: Build binaries (macOS)
        if: matrix.targets == 'darwin'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=$VERSION"
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o marina-darwin-amd64 ./cmd/marina
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o marina-darwin-arm64 ./cmd/marina

      - name: Build binaries (Windows)
        if: matrix.targets == 'windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=$VERSION"
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o marina-windows-amd64.exe ./cmd/marina
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o marina-windows-arm64.exe ./cmd/marina

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.targets }}
          path: marina-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum marina-* > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            marina-linux-amd64
            marina-linux-arm64
            marina-darwin-amd64
            marina-darwin-arm64
            marina-windows-amd64.exe
            marina-windows-arm64.exe
            SHA256SUMS
          generate_release_notes: true
